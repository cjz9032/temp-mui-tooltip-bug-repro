<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Tooltip controlled onClose repro</title></head><body>
<div id="root"></div>
<pre id="out" style="font:14px monospace"></pre>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "@emotion/react": "https://esm.sh/@emotion/react@11?external=react",
    "@emotion/styled": "https://esm.sh/@emotion/styled@11?external=react,@emotion/react",
    "@mui/material": "https://esm.sh/@mui/material@6.1.6?external=react,react-dom,@emotion/react,@emotion/styled",
    "@mui/utils": "https://esm.sh/@mui/utils@6.1.6?external=react,react-dom"
  }
}
</script>
<script type="module">
import { createElement as h, forwardRef, cloneElement, useCallback, useState } from 'react';
import { createRoot } from 'react-dom/client';
import { Tooltip, useForkRef } from '@mui/material';

const N = 200;
window.__C = { open:0, close:0 };

const WidgetTooltip = forwardRef(function WidgetTooltip({ children, onClose, onOpen, open:openProp, ...rest }, fwd) {
  const [open, setOpen] = useState(false);
  const hOpen = useCallback(e => { setOpen(true); onOpen?.(e); }, [onOpen]);
  const hClose = useCallback(e => { setOpen(false); onClose?.(e); }, [onClose]);
  const r = useForkRef(children.ref, fwd);
  return h(Tooltip, { ...rest, onClose:hClose, onOpen:hOpen, open }, cloneElement(children, { ref:r }));
});

function App() {
  return h('div', { style:{padding:20,display:'flex',flexWrap:'wrap',gap:2} },
    Array.from({length:N}, (_,i) =>
      h(WidgetTooltip, { key:i, title:'T'+i, enterDelay:0, leaveDelay:0,
        onOpen: ()=>{ window.__C.open++; },
        onClose: ()=>{ window.__C.close++; document.getElementById('out').textContent=`onOpen=${window.__C.open} onClose=${window.__C.close} dropped=${window.__C.open-window.__C.close}`; },
      }, h('div', { 'data-id':i,
        style:{width:60,height:22,border:'1px solid #ccc',borderRadius:2,fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}
      }, ''+i))
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
document.getElementById('out').textContent = 'ready';
</script>
</body></html>

<!doctype html>
<html lang="en">
<head><meta charset="utf-8"/><title>MUI Tooltip onClose bug — 对比</title>
<style>
body{font:14px/1.5 system-ui,sans-serif;padding:32px;max-width:900px;margin:0 auto;background:#fafafa}
h1{font-size:1.1rem;margin:0 0 4px}
h2{font-size:.9rem;margin:0 0 6px}
p{font-size:.85rem;color:#555;margin:4px 0 16px}
code{font:12px monospace;background:#f0f0f0;padding:1px 4px;border-radius:3px;font-size:11px}
pre{font:11px/1.4 monospace;background:#1e1e1e;color:#d4d4d4;padding:10px;border-radius:6px;overflow:auto}
.btn{padding:8px 24px;font-size:14px;font-weight:600;border:none;border-radius:6px;cursor:pointer;color:#fff;background:#2563eb;margin-right:8px}
.btn:hover{background:#1d4ed8}
.panel{display:flex;gap:16px;margin:12px 0}
.col{flex:1;border-radius:8px;padding:12px;border:1px solid}
.card{margin:8px 0;padding:12px;border-radius:6px;text-align:center;font-weight:700;font-size:1rem}
</style>
</head><body>

<h1>🐛 MUI Tooltip controlled-mode onClose bug — 对比</h1>
<p>
  Guard 读 render closure: <code>if (onClose &amp;&amp; open)</code> vs <code>if (onClose &amp;&amp; wasOpen)</code> (openRef)。
  onOpen 用 <code>setTimeout(0)</code> 推迟 setOpen(true) 来模拟卡顿导致的 commit 滞后。
</p>

<div id="root">loading modules from esm.sh…</div>

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "@emotion/react": "https://esm.sh/@emotion/react@11?external=react",
    "@emotion/styled": "https://esm.sh/@emotion/styled@11?external=react,@emotion/react",
    "@mui/material": "https://esm.sh/@mui/material@6.1.6?external=react,react-dom,@emotion/react,@emotion/styled",
    "@mui/utils": "https://esm.sh/@mui/utils@6.1.6?external=react"
  }
}
</script>

<script type="module">
import {createElement as h, useState, useRef, useLayoutEffect, forwardRef} from 'react';
import {createRoot} from 'react-dom/client';
import {Tooltip} from '@mui/material';

// ── Buggy: MUI 6.1.6 Tooltip (real) ──
// Tooltip.js L283: let open = openState;
// Tooltip.js L350: if (onClose && open) onClose(event);
//   → open 是闭包值,setOpen(true) 还没 commit 时永远是 false

// ── Fixed: openRef patch ──
// 修改 Tooltip.js 的 handleOpen/handleClose:
//   handleOpen: wasOpen=openRef.current; openRef.current=true; setOpenState(true); if(onOpen && !wasOpen)
//   handleClose: wasOpen=openRef.current; openRef.current=false; setOpenState(false); if(onClose && wasOpen)
const MiniTooltip = forwardRef(function MiniTooltip({open:openProp,onOpen,onClose,title,children},ref){
  const isControlled=openProp!==undefined;
  const[openState,setOpen]=useState(isControlled?openProp:false);
  const open=isControlled?openProp:openState;
  const openRef=useRef(open);
  useLayoutEffect(()=>{openRef.current=open;},[open]);

  const hOpen=(e)=>{
    const wasOpen=openRef.current;
    openRef.current=true;
    if(!isControlled)setOpen(true);
    if(onOpen&&!wasOpen)onOpen(e);
  };
  const hClose=(e)=>{
    const wasOpen=openRef.current;
    openRef.current=false;
    if(!isControlled)setOpen(false);
    if(onClose&&wasOpen)onClose(e);
  };

  return h('div',{style:{display:'inline-block'},ref},
    h('div',{onMouseOver:hOpen,onMouseLeave:hClose},children),
    open&&h('div',{role:'tooltip',style:{position:'fixed',padding:'4px 8px',background:'#333',color:'#fff',borderRadius:4,fontSize:12,pointerEvents:'none',zIndex:1500,marginTop:4}},title)
  );
});

// ── State ──
const B={o:0,c:0}, F={o:0,c:0};
let buggyOpen=false;

function App(){
  const[,t]=useState(0);

  const run=()=>{
    B.o=0;B.c=0;F.o=0;F.c=0;buggyOpen=false;
    t(n=>n+1);

    // 等 React commit 重渲染(重置数据),再发事件
    setTimeout(()=>{
      const be=document.querySelector('[data-id="b"]');
      const fe=document.querySelector('[data-id="f"]');
      if(!be||!fe)return;
      be.dispatchEvent(new MouseEvent('mouseover',{bubbles:true}));
      be.dispatchEvent(new MouseEvent('mouseleave',{bubbles:true}));
      fe.dispatchEvent(new MouseEvent('mouseover',{bubbles:true}));
      fe.dispatchEvent(new MouseEvent('mouseleave',{bubbles:true}));
      t(n=>n+1);
    },100);
  };

  return h('div',null,
    h('div',{class:'panel'},
      // BUGGY column
      h('div',{class:'col',style:{background:'#fef2f2',borderColor:'#fecaca'}},
        h('h2',{style:{color:'#dc2626'}},'🐛 Buggy (MUI 6.1.6)'),
        h('div',{style:{fontSize:12,color:'#dc2626',marginBottom:6}},
          h('code',{style:{background:'#fee2e2'}},'if (onClose && open) — 读闭包')),
        h('div',{class:'card '+(B.o>B.c?'bad':'good'),
          style:{background:B.o>B.c?'#fee2e2':'#f0fdf4',color:B.o>B.c?'#dc2626':'#166534'}},
          B.o===0?'⏳ 未运行':B.o>B.c?('❌ onClose 掉落 '+(B.o-B.c)+' 次'):'✓ 正常'),
        h('pre',{style:{fontSize:11,margin:0}},
` onOpen=${B.o}  onClose=${B.c}  dropped=${B.o-B.c}`),
        h('div',{style:{marginTop:8,display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:'#fff',borderRadius:4,border:'1px solid #fecaca'}},
          h(Tooltip,{open:buggyOpen,title:'Tooltip Content',enterDelay:0,leaveDelay:0,
            onOpen:()=>{B.o++;setTimeout(()=>{buggyOpen=true;},0);},
            onClose:()=>{B.c++;}
          },h('div',{'data-id':'b',style:{padding:'4px 10px',border:'1px solid #e8a0a0',borderRadius:4,cursor:'pointer',fontSize:12}},'🖱️ hover target')),
          h('span',{style:{fontSize:11,color:'#888'}},'受控 open=false')
        )
      ),
      // FIXED column
      h('div',{class:'col',style:{background:'#f0fdf4',borderColor:'#bbf7d0'}},
        h('h2',{style:{color:'#166534'}},'✅ Fixed (openRef)'),
        h('div',{style:{fontSize:12,color:'#166534',marginBottom:6}},
          h('code',{style:{background:'#dcfce7'}},'if (onClose && wasOpen) — 读 ref')),
        h('div',{class:'card',style:{background:'#dcfce7',color:'#166534'}},
          F.o===0?'⏳ 未运行':F.o>F.c?('❌ 异常掉落 '+F.o-F.c):'✅ onClose 正常触发'),
        h('pre',{style:{fontSize:11,margin:0}},
` onOpen=${F.o}  onClose=${F.c}  dropped=${F.o-F.c}`),
        h('div',{style:{marginTop:8,display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:'#fff',borderRadius:4,border:'1px solid #86d9a0'}},
          h(MiniTooltip,{title:'Tooltip Content',enterDelay:0,leaveDelay:0,
            onOpen:()=>{F.o++;},
            onClose:()=>{F.c++;}
          },h('div',{'data-id':'f',style:{padding:'4px 10px',border:'1px solid #86d9a0',borderRadius:4,cursor:'pointer',fontSize:12}},'🖱️ hover target')),
          h('span',{style:{fontSize:11,color:'#888'}},'非受控')
        )
      )
    ),
    h('button',{class:'btn',onClick:run},'▶ 运行'),
    h('pre',{style:{marginTop:12}},
`Timeline (两列同时执行):

mouseover → handleOpen → setOpen(true) ← 未 commit
         → onOpen → setTimeout(()=>setOpen(true),0) ← 被推迟
mouseleave → handleClose:
  🐛 Buggy:  if (onClose && open)     → open=false → onClose SKIPPED ✗
  ✅ Fixed:  if (onClose && wasOpen)  → wasOpen=true → onClose fires ✓

Fix 在 Tooltip.js 内的改动:
  const openRef = React.useRef(open);
  useLayoutEffect(() => { openRef.current = openState; }, [openState]);

  handleOpen:
    const wasOpen = openRef.current;
    openRef.current = true;        ← 同步写入,不等 commit
    setOpenState(true);
    if (onOpen && !wasOpen) onOpen(event);

  handleClose:
    const wasOpen = openRef.current;  ← 读 ref,不是闭包
    openRef.current = false;
    setOpenState(false);
    if (onClose && wasOpen) onClose(event);  ← wasOpen=true,正确触发`));
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body></html>

<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>MUI Tooltip onClose bug repro</title>
<style>
body{font:14px/1.5 system-ui,sans-serif;padding:32px;max-width:720px;margin:0 auto;background:#fafafa}
h1{font-size:1.1rem;margin:0 0 4px}
p{font-size:.85rem;color:#555;margin:4px 0 16px}
code{font:12px monospace;background:#f0f0f0;padding:1px 4px;border-radius:3px}
pre{font:11px/1.4 monospace;background:#1e1e1e;color:#d4d4d4;padding:10px;border-radius:6px;overflow:auto}
.btn{padding:8px 24px;font-size:14px;font-weight:600;border:none;border-radius:6px;cursor:pointer;color:#fff;background:#2563eb}
.btn:hover{background:#1d4ed8}
.card{margin:0 0 12px;padding:12px 16px;border-radius:6px;text-align:center;border:1px solid;font-weight:700}
</style></head><body>

<h1>🐛 MUI Tooltip controlled-mode onClose bug (v6.1.6)</h1>
<p>
  Tooltip.js  guard <code>if (onClose &amp;&amp; open)</code> (L350) 读的是渲染闭包的 <code>open</code>,不是最新 state。
  当父组件 <code>setOpen(true)</code> 因页面卡顿/批处理延迟提交时,mouseleave 读到的是还没 commit 的 <code>open=false</code> → onClose 被吞。
  点击 RUN 触发一次 mouseover→onOpen(defer setOpen)→mouseleave→看结果。
</p>

<div id="root">loading modules from esm.sh…</div>

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "@emotion/react": "https://esm.sh/@emotion/react@11?external=react",
    "@emotion/styled": "https://esm.sh/@emotion/styled@11?external=react,@emotion/react",
    "@mui/material": "https://esm.sh/@mui/material@6.1.6?external=react,react-dom,@emotion/react,@emotion/styled",
    "@mui/utils": "https://esm.sh/@mui/utils@6.1.6?external=react"
  }
}
</script>

<script type="module">
import {createElement as h, useState} from 'react';
import {createRoot} from 'react-dom/client';
import {Tooltip} from '@mui/material';

const C={o:0,c:0};
let open=false;

function App(){
  const[,t]=useState(0);
  const run=()=>{
    C.o=0;C.c=0;open=false;
    t(n=>n+1);
    setTimeout(()=>{
      // 1. mouseover → Tooltip.handleOpen → onOpen → setTimeout(setOpen,0)
      document.querySelector('[data-id="x"]').dispatchEvent(new MouseEvent('mouseover',{bubbles:true}));
      // 2. mouseleave → Tooltip.handleClose → if(onClose && open) → open 还是 false!
      document.querySelector('[data-id="x"]').dispatchEvent(new MouseEvent('mouseleave',{bubbles:true}));
      setTimeout(()=>t(n=>n+1),10);
    },100);
  };

  return h('div',null,
    h('button',{class:'btn',onClick:run},'▶ RUN'),
    h('div',{class:'card',style:{background:'#fef2f2',borderColor:'#fecaca',color:'#dc2626'}},
      C.o===0?'⏳ Click RUN':
      C.c===0?'❌ onClose DROPPED (open='+C.o+', close='+C.c+', dropped='+(C.o-C.c)+')':
      '✓ onClose fired'),
    h('div',{style:{display:'flex',alignItems:'center',gap:12,padding:'8px 12px',background:'#fff',border:'1px solid #e0e0e0',borderRadius:6,marginTop:12}},
      h(Tooltip,{
        open,title:'I am a Tooltip',enterDelay:0,leaveDelay:0,
        onOpen:()=>{C.o++;setTimeout(()=>{open=true;},0);}, // ← defer setOpen
        onClose:()=>{C.c++;}
      },h('div',{'data-id':'x',style:{padding:'6px 12px',border:'1px solid #d0d0d0',borderRadius:4,cursor:'pointer',fontSize:12}},h('b',null,'🖱 hover target'))),
      h('span',{style:{fontSize:12,color:'#888'}},'controlled Tooltip | ')),

    h('pre',{style:{marginTop:12}},
`结果解读:
  onOpen=1  onClose=0  dropped=1  → ❌ BUG 存在

Timeline:
  mouseover → handleOpen → setOpenState(true)
           → onOpen → setTimeout(()=>setOpen(true),0) ← commit 被推迟
  mouseleave → handleClose
             → if (onClose && open)  ← 闭包 open=false → onClose SKIPPED

Fix (openRef) 在 PR #48683 中:
  const openRef = React.useRef(open);
  useLayoutEffect(() => { openRef.current = openState; }, [openState]);

  handleOpen:
    const wasOpen = openRef.current;
    openRef.current = true;       // ← 同步写入,不等 commit
    setOpenState(true);
    if (onOpen && !wasOpen) onOpen(event);

  handleClose:
    const wasOpen = openRef.current;  // ← 读 ref,不是闭包
    openRef.current = false;
    setOpenState(false);
    if (onClose && wasOpen) onClose(event);  // ← 正确触发

验证:
  vitest (buggy):  handleClose: closure open=false → guard=false ❌
  vitest (fixed):  handleClose: openRef wasOpen=true → guard=true ✅`));
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body></html>
